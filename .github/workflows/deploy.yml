name: Build & Deploy — all clients

# ─────────────────────────────────────────────────────────────────────────────
# HOW TO ADD A NEW CLIENT
# ─────────────────────────────────────────────────────────────────────────────
# 1. Create a Cloudflare Pages project (name must match project-name below).
# 2. In CF dashboard → Pages project → Settings → Bindings, add KV binding:
#      Variable: MENU_CACHE  →  namespace ID from wrangler.toml (shared for all).
# 3. Copy a deploy-* job block below, fill in the client's values, commit.
#    On next push to main the new client deploys automatically in parallel.
#
# Shared repo secrets (Settings → Secrets → Actions):
#   NEXT_PUBLIC_SUPABASE_URL   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY  CLOUDFLARE_API_TOKEN  CLOUDFLARE_ACCOUNT_ID
#   R2_BUCKET_NAME             NEXT_PUBLIC_CDN_URL
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Type-check runs ONCE; all client deploys wait for it ──────────────────
  ci:
    name: Type-check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm typecheck
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # TypeScript doesn't validate env values — generic placeholders are fine here
          NEXT_PUBLIC_CLIENT_SLUG: ci-placeholder
          NEXT_PUBLIC_TIER: basic
          NEXT_PUBLIC_THEME: mercado

  # ── CLIENT: demo-cafe ──────────────────────────────────────────────────────
  deploy-demo-cafe:
    name: Deploy → demo-cafe
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    uses: ./.github/workflows/_deploy-client.yml
    with:
      project-name: cafe
      client-slug: demo-cafe
      site-url: https://cafe-1z6.pages.dev
      tier: premium
      theme: mercado
      bilingual: 'true'
      secondary-locale: hi
      reservations: 'false'
      multi-branch: 'false'
    secrets: inherit

  # ── ADD NEW CLIENTS BELOW ──────────────────────────────────────────────────
  # Each job builds and deploys independently in parallel after CI passes.
  # KV cache is automatically isolated per client via the `menu:<slug>` key.
  #
  # deploy-spice-garden:
  #   name: Deploy → spice-garden
  #   needs: ci
  #   if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
  #   uses: ./.github/workflows/_deploy-client.yml
  #   with:
  #     project-name: spice-garden          # CF Pages project name
  #     client-slug: spice-garden           # must match businesses.slug in Supabase
  #     site-url: https://spicegarden.com   # custom domain or *.pages.dev URL
  #     tier: advanced
  #     theme: bazaar
  #     whatsapp: '919876543210'
  #     phone: '+91 98765 43210'
  #     owner-email: owner@spicegarden.com
  #     reservations: 'true'
  #     multi-branch: 'false'
  #     bilingual: 'false'
  #   secrets: inherit
